<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CareerCraft AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 40px;
    }

    h1 {
      font-size: 2.5rem;
    }

    .container {
      background: #1e293b;
      padding: 30px;
      border-radius: 10px;
      max-width: 500px;
      margin: auto;
    }

    input, button {
      margin-top: 15px;
      padding: 10px;
      width: 100%;
      border-radius: 5px;
      border: none;
    }

    button {
      background: #3b82f6;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #2563eb;
    }

    #result {
      margin-top: 20px;
      text-align: left;
    }

    #loading {
      display: none;
      margin-top: 15px;
      color: yellow;
    }
  </style>
</head>

<body>

  <h1>🚀 CareerCraft AI</h1>
  <p>Upload your resume and get ATS score instantly</p>

  <div class="container">

    <form id="uploadForm">
      <input type="file" id="resume" accept=".pdf,.doc,.docx" required>
      <button type="submit">Analyze Resume</button>
    </form>

    <div id="loading">Analyzing...</div>

    <div id="result"></div>

  </div>

  <!-- SCRIPT CONNECTION -->
  <script src="script.js"></script>

</body>
</html>
